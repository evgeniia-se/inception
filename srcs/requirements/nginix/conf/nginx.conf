# Main Nginx configuration context
events {
	# Number of simultaneous connections that can be opened by a worker process
	worker_connections 1024;
}

http {
	# Include MIME(Multipurpose Internet Mail Extensions) - pasport of file
	#from server to browser
	# types to correctly render CSS, JS, and images
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Server block for our WordPress website
	server {
		# Listen only on port 443 for IPv4 and IPv6 with SSL enabled
		listen 443 ssl;
		listen [::]:443 ssl;

		# Define the domain name
		server_name esergeev.42.fr;

		# Paths to the SSL certificates (generated by our setup_nginx.sh script)
		ssl_certificate /etc/nginx/ssl/inception.crt;
		ssl_certificate_key /etc/nginx/ssl/inception.key;

		# STRICT 42 RULE: Only allow secure TLS protocols
		ssl_protocols TLSv1.2 TLSv1.3;

		# Root directory for website files and default index files
		root /var/www/wordpress;
		index index.php index.html index.htm;

		# Main location block: try to serve request as file, then directory, then fall back to 404
		location / {
			try_files $uri $uri/ =404;
		}

		# Pass PHP scripts to FastCGI server (WordPress container)
		location ~ \.php$ {
			include fastcgi_params;
			fastcgi_split_path_info ^(.+\.php)(/.+)$;
			# 'wordpress' is the hostname of our WordPress container, running on port 9000
			fastcgi_pass wordpress:9000;
			fastcgi_index index.php;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			fastcgi_param PATH_INFO $fastcgi_path_info;
		}
	}
}
